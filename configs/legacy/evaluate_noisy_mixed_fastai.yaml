version: 1
workflow: legacy_fastai_noisy_mixed_evaluation

# Archived from code/evaluate_noisy_mixed_fastai.py. Requires FastAI v1.
paths:
  base: repository_root
  data_root: data
  output_root: output

experiment:
  name: exp0
  model: fastai_xresnet1d101
