task: superdiagnostic
num_classes: 5
class_names: [NORM, MI, STTC, CD, HYP]
epochs: 50
batch_size: 128
learning_rate: 0.01
weight_decay: 0.01
optimizer: Adam
loss: BCEWithLogitsLoss
early_stopping_patience: 8
monitor: valid_loss
save_best_only: true
threshold_search: true
se_reduction: 16
seeds: [42]
snr_levels: [clean, 24, 12, 6, 0, -6]
mixed_precision: true
data_root: data
output_dir: /content/drive/MyDrive/ECG/se_ablation_results
experiments:
  - se_xresnet1d101
  - se_xresnet1d101_emd_late_fusion
