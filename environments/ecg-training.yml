name: ecg-training
channels:
  - pytorch
  - nvidia
  - conda-forge
  - nodefaults
dependencies:
  - python=3.10.16
  - pip
  - pytorch=2.5.1
  - pytorch-cuda=12.1
  - cuda-version=12.1
  - numpy=1.26.4
  - pandas=2.2.3
  - scipy=1.13.1
  - scikit-learn=1.5.2
  - matplotlib=3.9.2
  - pyyaml=6.0.2
  - pywavelets=1.7.0
  - wfdb=4.1.2
  - tqdm=4.66.5
  - pytest=8.3.5
  - pip:
      # Wavelet+NN is intentionally CPU-only to avoid a second CUDA runtime.
      - tensorflow-cpu==2.15.1
