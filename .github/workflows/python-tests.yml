name: Run tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r environments/requirements/core.txt
        python -m pip install -r environments/requirements/test.txt
        python -m pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
        python -m pip check
    - name: Validate dependency profile
      run: python code/check_training_environment.py --skip-wavelet
    - name: Run tests
      run: python -m pytest -q tests
